channels:
  - conda-forge
  - defaults

dependencies:
  - pip
  - ipython
  - numpydoc
  - sphinx>=1.3
  - astropy  # need this here, because we base classes off it (and docs need that).
  - pyyaml
  - matplotlib
  - nbconvert>=6.4.5
  - ipykernel
  - gsl
  - fftw
  - pkg-config
  - llvm-openmp
  - pip:
    - furo
    - setuptools_scm
    - bidict
    - cosmotile
    - nbsphinx
    - nbconvert>=6.4.5
    - cffi
    - sphinx-design
    - sphinx-copybutton
    - sphinx-autoapi
